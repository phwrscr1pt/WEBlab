version: '3.8'

services:
  web:
    build: .
    ports:
      - "80:3000"
    volumes:
      - ./src:/app/src
      - ./database:/app/database
    depends_on:
      db:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=thaimart
      - DB_USER=thaimart
      - DB_PASS=thaimart_secret
      - SESSION_SECRET=thaimart_session_secret_2026
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=thaimart
      - POSTGRES_USER=thaimart
      - POSTGRES_PASSWORD=thaimart_secret
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thaimart -d thaimart"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
